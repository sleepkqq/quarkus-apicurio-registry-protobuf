name: CI

on:
  pull_request:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build extension
        run: ./mvnw -B clean install -DskipTests

      - name: Build example model
        run: ./mvnw -B -f example-model/pom.xml clean install

      - name: Integration tests (JVM)
        run: ./mvnw -B -f integration-tests/pom.xml test
